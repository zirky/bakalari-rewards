{% extends "base.html" %}
{% from "macros.jinja" import window_vars with context %}
{% block page %}
<div class="row q-col-gutter-md">
  <div class="col-12 col-md-8 q-gutter-y-md">
    <q-card>
      <q-card-section class="q-pa-none">
        <q-table flat dense :rows="students" :columns="studentsTable.columns" row-key="id">
          <template v-slot:body-cell-id="props">
            <q-td :props="props" align="right">
              <q-btn flat round color="red" icon="delete" size="sm" @click="deleteStudent(props.row.id)"></q-btn>
            </q-td>
          </template>
        </q-table>
      </q-card-section>
    </q-card>
    <q-btn color="primary" @click="openFormDialog">Přidat žáka</q-btn>
  </div>

  <q-dialog v-model="formDialog.show" position="top">
    <q-card class="q-pa-lg" style="width: 500px">
      <q-form @submit="sendStudentData" class="q-gutter-md">
        <q-input filled dense v-model="formDialog.data.name" label="Jméno žáka"></q-input>
        <q-input filled dense v-model="formDialog.data.bakalari_url" label="URL Bakalářů"></q-input>
        <q-input filled dense v-model="formDialog.data.bakalari_username" label="Login"></q-input>
        <q-input filled dense v-model="formDialog.data.bakalari_password" type="password" label="Heslo"></q-input>
        <q-btn unelevated color="primary" type="submit">Uložit</q-btn>
      </q-form>
    </q-card>
  </q-dialog>
</div>
{% endblock %}
{% block scripts %}
{{ window_vars(user) }}
<script src="{{ url_for('bakalari_rewards_static', path='js/index.js') }}"></script>
{% endblock %}
