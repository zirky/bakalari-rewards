{% extends "base.html" %}
{% from "macros.jinja" import window_vars with context %}

{% block page %}
<div class="row q-col-gutter-md">
  <div class="col-12 col-md-8">
    <q-card>
      <q-card-section>
        <h6 class="q-my-none">Seznam žáků</h6>
        <q-table
          flat
          dense
          :rows="students"
          :columns="studentsTable.columns"
          row-key="id"
        ></q-table>
      </q-card-section>
    </q-card>
    <q-btn class="q-mt-md" color="primary" @click="openFormDialog">Přidat žáka</q-btn>
  </div>

  <q-dialog v-model="formDialog.show" position="top">
    <q-card class="q-pa-lg" style="width: 500px">
      <q-form @submit="sendStudentData" class="q-gutter-md">
        <q-input filled v-model="formDialog.data.name" label="Jméno žáka"></q-input>
        <q-input filled v-model="formDialog.data.bakalari_url" label="URL (https://...)"></q-input>
        <q-input filled v-model="formDialog.data.bakalari_username" label="Uživatelské jméno"></q-input>
        <q-input filled v-model="formDialog.data.bakalari_password" type="password" label="Heslo"></q-input>
        <q-btn unelevated color="primary" type="submit" label="Uložit"></q-btn>
      </q-form>
    </q-card>
  </q-dialog>
</div>
{% endblock %}

{% block scripts %}
{{ window_vars(user) }}
<script src="{{ url_for('bakalari_rewards_static', path='js/index.js') }}"></script>
{% endblock %}
