{% extends "base.html" %}
{% from "macros.jinja" import window_vars with context %}
{% block scripts %}
  {{ window_vars(user) }}
  <script src="{{ static_url_for('bakalari_rewards/static', path='js/index.js') }}"></script>
{% endblock %}
{% block page %}
<div class="row q-col-gutter-md">
  <div class="col-12 col-md-8 col-lg-7 q-gutter-y-md">
    <q-card>
      <q-card-section>
        <h5 class="text-subtitle1 q-my-none">
          <strong>Bakáláři Rewards</strong> &mdash; Automatické odměny v Bitcoin za školní známky
        </h5>
      </q-card-section>
    </q-card>

    <q-card>
      <q-card-section>
        <div class="row items-center no-wrap q-mb-md">
          <div class="col">
            <h5 class="text-subtitle1 q-my-none">Seznam žáků</h5>
          </div>
          <div class="col-auto">
            <q-btn flat color="primary" @click="formDialog.show = true" label="Přidat žáka" />
          </div>
        </div>
        <q-table
          :rows="students"
          :columns="studentsTable.columns"
          row-key="id"
          no-data-label="Zatím žádní žáci"
        >
          <template v-slot:body-cell-reward_sats="props">
            <q-td auto-width>
              <span>1: ${ props.row.reward_grade_1 } sat</span>
              <span class="q-ml-sm">2: ${ props.row.reward_grade_2 } sat</span>
              <span class="q-ml-sm">3: ${ props.row.reward_grade_3 } sat</span>
              <span class="q-ml-sm">4: ${ props.row.reward_grade_4 } sat</span>
              <span class="q-ml-sm">5: ${ props.row.reward_grade_5 } sat</span>
            </q-td>
          </template>
          <template v-slot:body-cell-actions="props">
            <q-td auto-width>
              <q-btn flat dense color="negative" icon="delete" @click="deleteStudent(props.row.id)" />
            </q-td>
          </template>
        </q-table>
      </q-card-section>
    </q-card>
  </div>
</div>

<q-dialog v-model="formDialog.show" persistent>
  <q-card style="min-width: 400px">
    <q-card-section>
      <div class="text-h6">Přidat žáka</div>
    </q-card-section>
    <q-card-section>
      <q-input
        v-model="formDialog.data.name"
        label="Jméno žáka"
        dense
        class="q-mb-sm"
      />
      <q-select
        v-model="formDialog.data.wallet"
        :options="g.user.wallets"
        option-value="id"
        option-label="name"
        emit-value
        map-options
        label="Peněženka"
        dense
        class="q-mb-sm"
      />
      <q-input
        v-model="formDialog.data.bakalari_url"
        label="URL Bakálářů (např. https://skola.cz/nextcloud)"
        dense
        class="q-mb-sm"
      />
      <q-input
        v-model="formDialog.data.bakalari_username"
        label="Přihlašovací jméno"
        dense
        class="q-mb-sm"
      />
      <q-input
        v-model="formDialog.data.bakalari_password"
        label="Heslo"
        type="password"
        dense
        class="q-mb-sm"
      />
      <div class="text-subtitle2 q-mt-md q-mb-sm">Odměna za známku (sats)</div>
      <div class="row q-gutter-sm">
        <q-input v-model.number="formDialog.data.reward_grade_1" label="1" type="number" dense style="width:70px" />
        <q-input v-model.number="formDialog.data.reward_grade_2" label="2" type="number" dense style="width:70px" />
        <q-input v-model.number="formDialog.data.reward_grade_3" label="3" type="number" dense style="width:70px" />
        <q-input v-model.number="formDialog.data.reward_grade_4" label="4" type="number" dense style="width:70px" />
        <q-input v-model.number="formDialog.data.reward_grade_5" label="5" type="number" dense style="width:70px" />
      </div>
    </q-card-section>
    <q-card-actions align="right">
      <q-btn flat label="Zrušit" @click="formDialog.show = false" />
      <q-btn color="primary" label="Uložit" @click="createStudent" />
    </q-card-actions>
  </q-card>
</q-dialog>
{% endblock %}
