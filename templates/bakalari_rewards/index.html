{% extends "base.html" %}
{% from "macros.jinja" import window_vars with context %}

{% block page %}
<div class="row q-col-gutter-md">
  <div class="col-12 col-md-8 q-gutter-y-md">
    <q-card>
      <q-card-section class="q-pa-none">
        <q-table
          flat
          dense
          :rows="students"
          :columns="studentsTable.columns"
          row-key="id"
        >
          <template v-slot:body="props">
            <q-tr :props="props">
              <q-td key="name" :props="props" v-text="props.row.name"></q-td>
              <q-td key="bakalari_url" :props="props" v-text="props.row.bakalari_url"></q-td>
              <q-td key="rewards" :props="props">
                1: <span v-text="props.row.reward_grade_1"></span>, 
                2: <span v-text="props.row.reward_grade_2"></span>
              </q-td>
              <q-td key="last_check" :props="props" v-text="props.row.last_check"></q-td>
              <q-td key="id" :props="props" align="right">
                <q-btn flat round color="blue" icon="edit" size="sm" @click="openEditDialog(props.row.id)"></q-btn>
                <q-btn flat round color="red" icon="delete" size="sm" @click="deleteStudent(props.row.id)"></q-btn>
              </q-td>
            </q-tr>
          </template>
        </q-table>
      </q-card-section>
    </q-card>

    <q-btn color="primary" @click="openFormDialog">Přidat žáka</q-btn>
  </div>

  <q-dialog v-if="formDialog" v-model="formDialog.show" position="top">
    <q-card class="q-pa-lg" style="width: 500px">
      <q-form @submit="sendStudentData" class="q-gutter-md">
        <h6 class="q-my-none" v-text="formDialog.data.id ? 'Upravit žáka' : 'Přidat žáka'"></h6>
        <q-input filled dense v-model="formDialog.data.name" label="Jméno žáka"></q-input>
        <q-input filled dense v-model="formDialog.data.bakalari_url" label="URL Bakalářů"></q-input>
        <q-input filled dense v-model="formDialog.data.bakalari_username" label="Login"></q-input>
        <q-input filled dense v-model="formDialog.data.bakalari_password" type="password" label="Heslo"></q-input>
        
        <div class="row q-mt-lg">
          <q-btn unelevated color="primary" type="submit">Uložit</q-btn>
          <q-btn v-close-popup flat color="grey" class="q-ml-auto">Zrušit</q-btn>
        </div>
      </q-form>
    </q-card>
  </q-dialog>
</div>
{% endblock %}

{% block scripts %}
{{ window_vars(user) }}
<script src="{{ url_for('bakalari_rewards_static', path='js/index.js') }}"></script>
{% endblock %}
